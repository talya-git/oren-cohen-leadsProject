<div class="min-h-screen bg-[#f9f6f1] flex items-center justify-center px-4">
  <div class="w-full max-w-[400px]">
    
    <!-- Logo & Brand -->
    <div class="text-center mb-10">
      <img src="assets/logo.png" alt="Oren Cohen Group" class="w-28 h-28 mx-auto rounded-full shadow-lg mb-6" />
      <h1 class="font-serif text-2xl tracking-[3px] text-[#1a1a1a] uppercase">Lead Management</h1>
      <p class="text-[#c9a96e] text-xs tracking-[4px] uppercase mt-2 font-medium">Oren Cohen Group</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.08)] p-8 border border-[#ece7df]">
      
      <!-- Login Form -->
      <div *ngIf="!needsPassword" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-[#6b6b6b] mb-1.5 tracking-wide">שם משתמש</label>
          <select [(ngModel)]="selectedName" (change)="onNameSelect()" 
                  class="w-full px-4 py-3 bg-[#f9f6f1] border border-[#ece7df] rounded-lg text-sm text-[#1a1a1a] outline-none focus:border-[#c9a96e] focus:ring-1 focus:ring-[#c9a96e]/20 transition-all appearance-none cursor-pointer">
            <option value="">בחר שם...</option>
            <option *ngFor="let name of agents" [value]="name">{{ name }}</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-[#6b6b6b] mb-1.5 tracking-wide">סיסמה</label>
          <input type="password" [(ngModel)]="password" placeholder="••••••" 
                 (keyup.enter)="login()"
                 class="w-full px-4 py-3 bg-[#f9f6f1] border border-[#ece7df] rounded-lg text-sm text-[#1a1a1a] outline-none focus:border-[#c9a96e] focus:ring-1 focus:ring-[#c9a96e]/20 transition-all placeholder:text-[#c4bfb6]" />
        </div>
        <button (click)="login()" [disabled]="loading"
                class="w-full py-3.5 bg-[#c9a96e] hover:bg-[#b08d4f] disabled:opacity-40 text-white text-sm font-bold tracking-[1.5px] uppercase rounded-lg transition-all duration-300 shadow-[0_4px_16px_rgba(201,169,110,0.3)] hover:shadow-[0_6px_24px_rgba(201,169,110,0.4)]">
          {{ loading ? '...' : 'כניסה' }}
        </button>
      </div>

      <!-- Set Password Form -->
      <div *ngIf="needsPassword" class="space-y-4">
        <p class="text-center text-sm text-[#6b6b6b]">כניסה ראשונה — הגדר סיסמה</p>
        <div>
          <label class="block text-xs font-medium text-[#6b6b6b] mb-1.5 tracking-wide">בחר סיסמה</label>
          <input type="password" [(ngModel)]="newPassword" placeholder="לפחות 3 תווים"
                 (keyup.enter)="setPassword()"
                 class="w-full px-4 py-3 bg-[#f9f6f1] border border-[#ece7df] rounded-lg text-sm text-[#1a1a1a] outline-none focus:border-[#c9a96e] focus:ring-1 focus:ring-[#c9a96e]/20 transition-all placeholder:text-[#c4bfb6]" />
        </div>
        <button (click)="setPassword()" [disabled]="loading"
                class="w-full py-3.5 bg-[#c9a96e] hover:bg-[#b08d4f] disabled:opacity-40 text-white text-sm font-bold tracking-[1.5px] uppercase rounded-lg transition-all duration-300 shadow-[0_4px_16px_rgba(201,169,110,0.3)]">
          {{ loading ? '...' : 'שמור וכנס' }}
        </button>
      </div>

      <!-- Error -->
      <p *ngIf="error" class="text-center text-[#c0392b] text-xs mt-4">{{ error }}</p>
    </div>

    <!-- Footer -->
    <p class="text-center text-[10px] text-[#b5ad9f] mt-8 tracking-wide">© Oren Cohen Group — Lead Management System</p>
  </div>
</div>
